name: flutter_interview_prep
description: "Flutter Interview Prep — Mid & Senior level study guide"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.10.0
  drift: ^2.34.0
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  injectable: ^3.0.0
  json_annotation: ^4.12.0
  retrofit: ^4.9.2
  window_manager: ^0.4.3
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.15.0
  drift_dev: ^2.34.1+1
  freezed: ^4.0.0-dev.3
  injectable_generator: ^3.1.0
  json_serializable: ^6.14.0
  retrofit_generator: ^10.2.7

flutter:
  uses-material-design: true
